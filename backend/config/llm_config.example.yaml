# CAD Agent — LLM 配置模板
# 使用方法:
#   cp backend/config/llm_config.example.yaml backend/config/llm_config.yaml
#   填入 api_key，或（推荐）通过环境变量提供（见下方）
#
# 推荐：把密钥放到仓库根的 .env（已 gitignore），启动时由 python-dotenv 自动加载。
#   cp .env.example .env   然后填入密钥
# 环境变量优先级高于 yaml 中的 api_key 字段:
#   OPENAI_API_KEY=sk-...
#   ANTHROPIC_API_KEY=sk-ant-...
#   DASHSCOPE_API_KEY=sk-...
#   DEEPSEEK_API_KEY=sk-...
#   ZHIPU_API_KEY=...

active_provider: openai
max_repair_iterations: 6

providers:
  openai:
    provider: openai
    model_name: gpt-4o
    api_key: ""
    base_url: null
    stream: true

  anthropic:
    provider: anthropic
    model_name: claude-sonnet-4-6
    api_key: ""
    base_url: null
    stream: true

  dashscope:
    provider: dashscope
    model_name: qwen-plus
    api_key: ""
    stream: true

  deepseek:
    provider: deepseek
    model_name: deepseek-chat
    api_key: ""
    stream: true

  ollama:
    provider: ollama
    model_name: qwen2.5:7b
    base_url: "http://localhost:11434"
    stream: true

  zhipu:
    provider: zhipu
    model_name: GLM-5.2
    api_key: ""
    base_url: null
    stream: true
